name: Cloudflare & Hugging Face Deployment

on:
  push:
    branches:
      - main

jobs:
  # --- 1. FRONTEND DEPLOYMENT (Cloudflare Pages) ---
  deploy-frontends:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [landing, dashboard, oversight, root-admin]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './${{ matrix.project }}/package-lock.json'

      - name: Install & Build ${{ matrix.project }}
        run: |
          cd ${{ matrix.project }}
          # Use ci if lockfile exists, otherwise standard install
          npm install
          npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: anchor-${{ matrix.project }}
          directory: ${{ matrix.project }}/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  # --- 2. BACKEND DEPLOYMENT (Hugging Face Space) ---
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Robust Force-Push Sync Strategy
          cd server
          rm -f *.db  # Ensure no local DBs survive the sync
          git init -b main
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "deploy: anchor hub production sync"
          git remote add hf https://AnimusLab:${HF_TOKEN}@huggingface.co/spaces/AnimusLab/Anchor
          git push hf main --force
